name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: reviews-service
            path: docker-practice
            extra-requirements: requirements-test.txt
          - service: notification-service
            path: notification-service
            extra-requirements: ""

    name: ${{ matrix.service }}

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -n "${{ matrix.extra-requirements }}" ]; then
            pip install -r ${{ matrix.extra-requirements }}
          fi

      - name: Run tests
        run: python -m pytest -v
