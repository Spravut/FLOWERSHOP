name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: reviews-service
            path: docker-practice
            extra-requirements: requirements-test.txt
            coverage-threshold: 70
          - service: notification-service
            path: notification-service
            extra-requirements: ""
            # TODO: raise to 70 once app/main.py and nats_consumer.py have more coverage (now ~57%)
            coverage-threshold: 50

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -n "${{ matrix.extra-requirements }}" ]; then
            pip install -r ${{ matrix.extra-requirements }}
          fi
          pip install ruff mypy pytest pytest-cov

      - name: Lint with ruff
        run: ruff check app/

      - name: Type check with mypy
        run: mypy app
        continue-on-error: true

      - name: Test with pytest
        run: pytest --cov=app --cov-fail-under=${{ matrix.coverage-threshold }} tests/

  build-and-push:
    name: build-and-push (${{ matrix.service }})
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: reviews-service
            context: docker-practice
          - service: notification-service
            context: notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        env:
          REPO: ${{ github.repository }}
        run: echo "IMAGE=ghcr.io/${REPO,,}/${{ matrix.service }}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            ${{ matrix.context }}

      - name: Push Docker image
        run: |
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

  deploy:
    name: deploy
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy (placeholder)
        env:
          REPO: ${{ github.repository }}
        run: |
          BASE="ghcr.io/${REPO,,}"
          echo "Deploy step (placeholder — wire up to a real environment when ready)"
          echo "  ${BASE}/reviews-service:${{ github.sha }}"
          echo "  ${BASE}/notification-service:${{ github.sha }}"

  notify:
    name: notify
    needs: [test, build-and-push, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *${{ github.workflow }}* — `${{ github.repository }}`

            • test: `${{ needs.test.result }}`
            • build-and-push: `${{ needs.build-and-push.result }}`
            • deploy: `${{ needs.deploy.result }}`

            Branch: `${{ github.ref_name }}`
            Author: `${{ github.actor }}`
            Commit: ${{ github.event.head_commit.message || github.event.pull_request.title }}

            [Open run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
